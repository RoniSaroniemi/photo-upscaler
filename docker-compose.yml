services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - TEMP_DIR=/tmp/upscaler
      - MAX_FILE_SIZE_MB=10
      - MODEL_NAME=RealESRGAN_x4plus
      - SCALE_FACTOR=4
      - COMPUTE_COST_PER_IMAGE=0.02
      - PLATFORM_FEE_PER_IMAGE=0.03
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped
